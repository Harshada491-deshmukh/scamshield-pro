name: ScamShield Pro CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test-backend:
    name: Test Node.js Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Verify backend files exist
        run: |
          echo "Checking backend files..."
          ls server/
          ls server/routes/
          ls server/models/
          echo "✅ All backend files found!"

      - name: Test backend loads correctly
        run: |
          cd server
          node -e "
            const express = require('express');
            console.log('✅ Express loaded');
            const mongoose = require('mongoose');
            console.log('✅ Mongoose loaded');
            console.log('✅ Backend test passed!');
          "

  test-ai-service:
    name: Test Python AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd ml-service
          pip install flask flask-cors scikit-learn pandas numpy requests

      - name: Verify AI files exist
        run: |
          echo "Checking AI service files..."
          ls ml-service/
          echo "✅ All AI files found!"

      - name: Test AI model predictions
        run: |
          cd ml-service
          python -c "
          from model import analyze_text, analyze_url
          print('Testing AI model...')
          pred, conf, reasons = analyze_text('Your account will be blocked. Verify now: http://bank-secure.xyz')
          assert pred == 'Scam', f'Expected Scam but got {pred}'
          print(f'Test 1 passed: {pred} ({conf}%)')
          pred, conf, reasons = analyze_text('Hi your order has been delivered successfully')
          assert pred == 'Safe', f'Expected Safe but got {pred}'
          print(f'Test 2 passed: {pred} ({conf}%)')
          pred, conf, reasons = analyze_url('http://bank-secure-login.xyz/verify')
          assert pred == 'Scam', f'Expected Scam but got {pred}'
          print(f'Test 3 passed: {pred} ({conf}%)')
          print('✅ All AI tests passed!')
          "

  test-frontend:
    name: Test React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Verify frontend files exist
        run: |
          echo "Checking frontend files..."
          ls client/src/
          ls client/src/pages/
          ls client/src/components/
          echo "✅ All frontend files found!"

      - name: Build React app
        run: |
          cd client
          CI=false npm run build
          echo "✅ React build successful!"

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify docker-compose file exists
        run: |
          echo "Checking docker-compose.yml..."
          cat docker-compose.yml
          echo "✅ docker-compose.yml found!"

      - name: Check all Dockerfiles exist
        run: |
          echo "Checking Dockerfiles..."
          ls client/Dockerfile
          ls server/Dockerfile
          ls ml-service/Dockerfile
          echo "✅ All Dockerfiles found!"

  pipeline-success:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend, build-docker]
    steps:
      - name: Success message
        run: |
          echo "🎉 ScamShield Pro CI/CD PASSED!"
          echo "✅ Backend tests passed"
          echo "✅ AI service tests passed"
          echo "✅ Frontend build successful"
          echo "✅ Docker files verified"
          echo "🚀 Project is ready!"


